# example-caller.yml
# PR 评论触发模板 —— 复制到目标仓库的 .github/workflows/ 目录使用。
# 当 PR 评论中包含 @claude 时，自动触发 Claude Code 分析。
# 前置条件：在目标仓库 Secrets 中配置 AGENT_PAT 和 CLAUDE_API_KEY

name: Claude Bot (Comment Trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-comment:
    name: Claude Code Comment Review
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      !endsWith(github.actor, '[bot]') &&
      github.actor != 'dependabot'
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    with:
      caller_repo: ${{ github.repository }}
      pr_number: ${{ github.event.issue.number }}
      issue_number: ${{ github.event.issue.number }}
      comment_author: ${{ github.event.comment.user.login }}
      comment_body: ${{ github.event.comment.body }}
      allow_code_change: false
      model: 'claude-sonnet-4-20250514'
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
