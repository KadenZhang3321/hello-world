# claude-auto.yml
#
# 自动触发模板 —— PR 开启/更新时自动触发 Claude Code 分析和修改。
# 
# 前置条件：
#   在目标仓库 Settings → Secrets and variables → Actions 中添加：
#     DISPATCH_TOKEN = <由 agent-skills 管理员分发的 PAT，具备 repo 权限>

name: Claude Bot (Auto)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  trigger-claude:
    name: Trigger Claude Code
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Dispatch to agent-skills
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_AUTHOR: ${{ github.event.pull_request.user.login }}
          CALLER_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          payload = {
            'caller_repo':       os.environ['CALLER_REPO'],
            'pr_number':         os.environ['PR_NUMBER'],
            'issue_number':      os.environ['ISSUE_NUMBER'],
            'comment_body':      'Auto-triggered: Please review this PR, analyze code feasibility, and suggest improvements if needed.',
            'comment_author':    os.environ['COMMENT_AUTHOR'],
            'allow_code_change': 'true',
            'skill_name':        '',
            'model':             'claude-sonnet-4-20250514',
            'caller_image':      '',
            'verify_command':    'javac *.java && java Main',
          }

          dispatch_body = json.dumps({
            'event_type':     'claude-request',
            'client_payload': payload,
          })

          r = subprocess.run([
            'curl', '-sf', '-X', 'POST',
            '-H', f'Authorization: Bearer {os.environ["DISPATCH_TOKEN"]}',
            '-H', 'Accept: application/vnd.github+json',
            'https://api.github.com/repos/KadenZhang3321/agent-skills/dispatches',
            '-d', dispatch_body,
          ], capture_output=True, text=True)

          print(f'Dispatch result: returncode={r.returncode}')
          print(f'stdout: {r.stdout}')
          print(f'stderr: {r.stderr}')

          if r.returncode != 0:
            print(f'::warning::Dispatch failed: {r.stderr}')
          else:
            print('Claude analysis dispatched.')
          PYEOF
