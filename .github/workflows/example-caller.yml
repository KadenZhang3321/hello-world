# example-caller.yml
#
# 调用方示例文件 —— 可直接复制到目标仓库的 .github/workflows/ 目录使用。
#
# 使用前，按需修改以下字段：
#   - org_name:     目标组织名称（留空则跳过组织成员检查）
#   - model:        Claude 模型名称
#   - auth_method:  认证方式（api_key 或 oidc）
#   - api_base_url: 第三方 API 地址（可选，留空使用官方）

name: Claude Bot

on:
  # Issue/PR 评论时触发（需在评论中 @claude）
  issue_comment:
    types: [created]

  # 新建 Issue 时自动触发
  issues:
    types: [opened]

# 工作流级别权限声明（调用方负责声明）
permissions:
  contents: read
  pull-requests: write
  issues: write
  # id-token: write  # 仅 auth_method: oidc 时需要

jobs:
  claude:
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    secrets: inherit
    with:
      # ---- 模型配置 ----
      model: 'claude-sonnet-4'
      timeout_minutes: 60

      # ---- 认证方式 ----
      # api_key: CLAUDE_API_KEY 由 opensourceways 组织级 Secret 统一提供，无需在本仓库单独设置
      # oidc:    配置 AWS IAM OIDC 信任策略，填写 aws_role_arn
      auth_method: 'api_key'
      # aws_region: 'us-east-1'
      # aws_role_arn: 'arn:aws:iam::123456789012:role/github-actions-claude'

      # ---- 第三方 API 地址（可选）----
      # 留空使用官方 https://api.anthropic.com
      # 填写后，CLAUDE_API_KEY 使用对应平台的 key
      # api_base_url: 'https://your-proxy.example.com'
      # 注意：部分第三方代理会屏蔽 GitHub Actions IP，如遇 403 请换用官方 API 或自建代理

      # ---- 组织检查 ----
      # 填写组织名以启用成员检查；留空则跳过（适用于个人仓库或自定义鉴权场景）
      org_name: 'vllm-project'

      # ---- 可选配置 ----
      # setup_script: 'pip install boto3'
      # additional_claude_args: ''
