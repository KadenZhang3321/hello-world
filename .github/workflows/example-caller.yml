# example-caller.yml
#
# 调用方示例文件 —— 可直接复制到目标仓库的 .github/workflows/ 目录使用。
#
# 使用前，按需修改以下字段：
#   - org_name:     目标组织名称（留空则跳过组织成员检查）
#   - model:        Claude 模型名称
#   - auth_method:  认证方式（api_key 或 oidc）
#   - api_base_url: 第三方 API 地址（可选，留空使用官方）

name: Claude Bot

on:
  # Issue/PR 评论时触发（需在评论中 @claude）
  issue_comment:
    types: [created]

  # 新建 Issue 时自动触发
  issues:
    types: [opened]

# 工作流级别权限声明（调用方负责声明）
permissions:
  contents: read
  pull-requests: write
  issues: write
  # id-token: write  # 仅 auth_method: oidc 时需要

jobs:
  claude:
    uses: KadenZhang3321/agent-skills/.github/workflows/_claude-code.yml@main
    secrets: inherit
    with:
      # ---- 模型配置 ----
      # OpenRouter 模型格式：<provider>/<model-name>
      model: 'anthropic/claude-opus-4-6'
      timeout_minutes: 60

      # ---- 认证方式 ----
      auth_method: 'api_key'

      # ---- API 配置（OpenRouter）----
      api_base_url: 'https://openrouter.ai/api'
      api_format: 'openai'   # OpenRouter 使用 OpenAI 兼容格式

      # ---- 组织检查 ----
      # 填写组织名以启用成员检查；留空则跳过（适用于个人仓库或自定义鉴权场景）
      org_name: ''

      # ---- 可选配置 ----
      # setup_script: 'pip install boto3'
      # additional_claude_args: ''
